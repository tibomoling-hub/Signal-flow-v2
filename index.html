<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignalFlow | Orchestration de Workflows IA</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#3b82f6',
                            neon: '#60a5fa',
                            glow: 'rgba(59, 130, 246, 0.5)',
                        },
                        anthracite: {
                            950: '#0a0a0c', // Deepest
                            900: '#121215', // Card background
                            800: '#1c1c21', // Border / Lighter card
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    },
                    letterSpacing: {
                        tighter: '-0.05em',
                        tight: '-0.025em',
                        normal: '0',
                        wide: '0.025em',
                        wider: '0.05em',
                        widest: '0.1em',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/style.css">
    
    <!-- External Libs -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Global Debugger -->
    <script>
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            const app = document.getElementById('app');
            if (app) {
                app.innerHTML = `
                    <div style="background: #0a0a0c; color: #f8fafc; padding: 40px; min-height: 100vh; font-family: sans-serif; display: flex; align-items: center; justify-content: center;">
                        <div style="max-width: 600px; width: 100%; background: #121215; padding: 40px; border-radius: 24px; border: 1px solid #1c1c21; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);">
                            <h1 style="color: #ef4444; font-size: 28px; font-weight: 900; margin-bottom: 10px;">❌ Erreur d'initialisation</h1>
                            <p style="margin-bottom: 24px; color: #94a3b8; font-size: 16px;">SignalFlow n'a pas pu démarrer correctement.</p>
                            <div style="background: #0a0a0c; padding: 20px; border-radius: 12px; border: 1px solid #1c1c21; font-family: monospace; font-size: 13px; white-space: pre-wrap; color: #60a5fa; overflow-x: auto;">
[Erreur] ${msg}
[Fichier] ${url}
[Ligne] ${lineNo}:${columnNo}
                            </div>
                            <button onclick="location.reload(true)" style="margin-top: 30px; width: 100%; background: #3b82f6; color: white; border: none; padding: 16px; border-radius: 12px; cursor: pointer; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em;">Rafraîchir la page</button>
                        </div>
                    </div>
                `;
            }
            return false;
        };
    </script>
</head>
<body class="bg-anthracite-950 text-zinc-300 font-sans selection:bg-blue-500/30">
    <div id="app" class="min-h-screen flex flex-col">
        <div class="flex-1 flex flex-col items-center justify-center space-y-6">
            <div class="relative">
                <div class="w-16 h-16 border-2 border-blue-500/20 border-t-blue-500 rounded-full animate-spin"></div>
                <div class="absolute inset-0 bg-blue-500/10 blur-xl rounded-full"></div>
            </div>
            <p class="text-blue-500 font-medium tracking-widest text-[10px] uppercase">Orchestration en cours...</p>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
